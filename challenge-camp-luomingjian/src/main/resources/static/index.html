<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据清洗智能体 - 极速版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .upload-area:hover {
            background: #f0f4ff;
        }

        .upload-area.dragover {
            background: #e8ecff;
        }

        .upload-icon {
            font-size: 4rem;
            color: #667eea;
            margin-bottom: 15px;
        }

        .btn {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 5px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-green {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }

        .btn-orange {
            background: linear-gradient(135deg, #ff7e5f 0%, #feb47b 100%);
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: #e9ecef;
            border-radius: 5px;
            overflow: hidden;
            margin: 15px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s ease;
        }

        .status {
            padding: 10px 15px;
            border-radius: 8px;
            margin: 10px 0;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
        }

        .status.running {
            background: #cce5ff;
            color: #004085;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
        }

        .data-preview {
            overflow-x: auto;
            margin-top: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        th, td {
            padding: 10px;
            text-align: left;
            border: 1px solid #dee2e6;
        }

        th {
            background: #667eea;
            color: white;
        }

        tr:nth-child(even) {
            background: #f8f9fa;
        }

        .analysis-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .analysis-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .analysis-card .number {
            font-size: 1.8rem;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚡ 数据清洗智能体 - 极速版</h1>
            <p>2分钟内完成清洗，无需等待！</p>
        </div>

        <div class="card">
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📁</div>
                <h3>点击或拖拽文件到此处</h3>
                <p style="color: #6c757d; margin-top: 10px;">支持 CSV 格式</p>
                <input type="file" id="fileInput" accept=".csv" style="display: none;">
            </div>

            <div id="fileInfo" style="display: none;">
                <h3 style="margin: 20px 0;">📄 文件信息</h3>
                <p id="fileName"></p>
                <div class="analysis-grid" id="analysisGrid"></div>
                <div class="data-preview" id="dataPreview"></div>
            </div>

            <div class="button-group">
                <button class="btn" id="cleanBtn" onclick="startCleaning()" disabled>开始清洗</button>
                <button class="btn btn-green" id="downloadBtn" onclick="downloadResult()" style="display: none;">下载结果</button>
                <button class="btn btn-orange" id="openFolderBtn" onclick="openFolder()" style="display: none;">打开文件夹</button>
            </div>
        </div>

        <div class="card" id="statusCard" style="display: none;">
            <h3>📊 清洗进度</h3>
            <div class="status" id="statusBadge">待处理</div>
            <p id="statusMessage"></p>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <p>进度: <span id="progressText">0</span>%</p>
            <p id="durationInfo" style="display: none;"></p>
        </div>
    </div>

    <script>
        let currentTaskId = null;

        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');

        uploadArea.addEventListener('click', () => fileInput.click());

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        async function handleFile(file) {
            document.getElementById('fileName').textContent = `文件名: ${file.name}`;
            document.getElementById('fileInfo').style.display = 'block';
            document.getElementById('cleanBtn').disabled = true;
            document.getElementById('downloadBtn').style.display = 'none';
            document.getElementById('openFolderBtn').style.display = 'none';
            
            const formData = new FormData();
            formData.append('file', file);
            
            try {
                const response = await fetch('/api/clean/upload', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                currentTaskId = data.taskId;
                
                const analysis = data.analysis;
                document.getElementById('analysisGrid').innerHTML = `
                    <div class="analysis-card">
                        <div class="number">${analysis.rowCount}</div>
                        <div class="label">行数</div>
                    </div>
                    <div class="analysis-card">
                        <div class="number">${analysis.columnCount}</div>
                        <div class="label">列数</div>
                    </div>
                `;
                
                let tableHTML = '<h4>数据预览</h4><table><thead><tr>';
                for (let col of data.sample[0] ? Object.keys(data.sample[0]) : []) {
                    tableHTML += `<th>${col}</th>`;
                }
                tableHTML += '</tr></thead><tbody>';
                
                for (let row of data.sample) {
                    tableHTML += '<tr>';
                    for (let val of Object.values(row)) {
                        tableHTML += `<td>${val}</td>`;
                    }
                    tableHTML += '</tr>';
                }
                tableHTML += '</tbody></table>';
                document.getElementById('dataPreview').innerHTML = tableHTML;
                
                document.getElementById('cleanBtn').disabled = false;
            } catch (error) {
                alert('上传失败: ' + error);
            }
        }

        async function startCleaning() {
            if (!currentTaskId) return;

            document.getElementById('statusCard').style.display = 'block';
            document.getElementById('statusBadge').className = 'status running';
            document.getElementById('statusBadge').textContent = '运行中';
            document.getElementById('statusMessage').textContent = '正在快速清洗数据...';
            document.getElementById('progressFill').style.width = '20%';
            document.getElementById('progressText').textContent = '20';
            document.getElementById('cleanBtn').disabled = true;
            document.getElementById('downloadBtn').style.display = 'none';
            document.getElementById('openFolderBtn').style.display = 'none';
            document.getElementById('durationInfo').style.display = 'none';

            try {
                // 先启动清洗
                const startResponse = await fetch(`/api/clean/start/${currentTaskId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({})
                });
                
                const result = await startResponse.json();
                
                // 然后轮询状态直到完成
                await pollUntilComplete();
                
            } catch (error) {
                document.getElementById('statusBadge').className = 'status error';
                document.getElementById('statusBadge').textContent = '失败';
                document.getElementById('statusMessage').textContent = error;
            }
        }

        async function pollUntilComplete() {
        let attempts = 0;
        const maxAttempts = 60; // 最多等待60次，每次1秒
        
        while (attempts < maxAttempts) {
            try {
                const response = await fetch(`/api/clean/status/${currentTaskId}`);
                const data = await response.json();

                document.getElementById('progressFill').style.width = data.progress + '%';
                document.getElementById('progressText').textContent = data.progress;

                if (data.status === 'success') {
                    document.getElementById('statusBadge').className = 'status success';
                    document.getElementById('statusBadge').textContent = '成功';
                    document.getElementById('statusMessage').textContent = '清洗完成！';
                    document.getElementById('downloadBtn').style.display = 'inline-block';
                    document.getElementById('openFolderBtn').style.display = 'inline-block';
                    
                    if (data.durationMs) {
                        document.getElementById('durationInfo').style.display = 'block';
                        document.getElementById('durationInfo').textContent = 
                            `完成时间: ${(data.durationMs / 1000).toFixed(2)}秒`;
                    }
                    
                    // 如果有清洗报告，显示详细信息
                    if (data.cleaningReport) {
                        displayCleaningReport(data.cleaningReport);
                    }
                    return;
                } else if (data.status === 'error') {
                    document.getElementById('statusBadge').className = 'status error';
                    document.getElementById('statusBadge').textContent = '失败';
                    document.getElementById('statusMessage').textContent = data.error || '未知错误';
                    return;
                }
                
                attempts++;
                await sleep(1000);
                
            } catch (error) {
                console.error(error);
                await sleep(1000);
            }
        }
        
        document.getElementById('statusBadge').className = 'status error';
        document.getElementById('statusBadge').textContent = '超时';
        document.getElementById('statusMessage').textContent = '等待时间过长，请重试';
    }
    
    function displayCleaningReport(report) {
        let reportHTML = `
            <div class="card" style="margin-top: 20px;">
                <h3>📊 清洗报告</h3>
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin: 20px 0;">
                    <div style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
                                color: white; padding: 15px; border-radius: 10px; text-align: center;">
                        <div style="font-size: 1.8rem; font-weight: bold;">${report.originalRowCount}</div>
                        <div>原始行数</div>
                    </div>
                    <div style="background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); 
                                color: white; padding: 15px; border-radius: 10px; text-align: center;">
                        <div style="font-size: 1.8rem; font-weight: bold;">${report.finalRowCount}</div>
                        <div>清洗后行数</div>
                    </div>
                    <div style="background: linear-gradient(135deg, #ff7e5f 0%, #feb47b 100%); 
                                color: white; padding: 15px; border-radius: 10px; text-align: center;">
                        <div style="font-size: 1.8rem; font-weight: bold;">${report.removedDuplicates}</div>
                        <div>删除重复项</div>
                    </div>
                    <div style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); 
                                color: white; padding: 15px; border-radius: 10px; text-align: center;">
                        <div style="font-size: 1.8rem; font-weight: bold;">${report.standardizedDates}</div>
                        <div>标准化日期</div>
                    </div>
                    <div style="background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); 
                                color: white; padding: 15px; border-radius: 10px; text-align: center;">
                        <div style="font-size: 1.8rem; font-weight: bold;">${report.filledMissingValues}</div>
                        <div>填充缺失值</div>
                    </div>
                    <div style="background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%); 
                                color: white; padding: 15px; border-radius: 10px; text-align: center;">
                        <div style="font-size: 1.8rem; font-weight: bold;">${report.maskedSensitiveData}</div>
                        <div>脱敏敏感数据</div>
                    </div>
                    <div style="background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%); 
                                color: white; padding: 15px; border-radius: 10px; text-align: center;">
                        <div style="font-size: 1.8rem; font-weight: bold;">${report.cleanedTextEntries}</div>
                        <div>清理文本</div>
                    </div>
                </div>`;
        
        if (report.columnStats && Object.keys(report.columnStats).length > 0) {
            reportHTML += `
                <div style="margin-top: 20px;">
                    <h4>📝 各列统计</h4>
                    <table style="width: 100%; border-collapse: collapse; margin-top: 10px;">
                        <thead>
                            <tr style="background: #667eea; color: white;">
                                <th style="padding: 10px; text-align: left; border: 1px solid #ddd;">列名</th>
                                <th style="padding: 10px; text-align: left; border: 1px solid #ddd;">修改记录数</th>
                            </tr>
                        </thead>
                        <tbody>`;
            
            for (const [column, count] of Object.entries(report.columnStats)) {
                reportHTML += `
                    <tr>
                        <td style="padding: 10px; border: 1px solid #ddd;">${column}</td>
                        <td style="padding: 10px; border: 1px solid #ddd;">${count}</td>
                    </tr>`;
            }
            
            reportHTML += `
                        </tbody>
                    </table>
                </div>`;
        }
        
        reportHTML += `</div>`;
        
        document.getElementById('statusCard').insertAdjacentHTML('afterend', reportHTML);
    }
        
        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        function downloadResult() {
            if (!currentTaskId) return;
            window.location.href = `/api/clean/download/${currentTaskId}`;
        }
        
        async function openFolder() {
            if (!currentTaskId) return;
            
            try {
                const response = await fetch(`/api/clean/open-folder/${currentTaskId}`, {
                    method: 'POST'
                });
                const result = await response.json();
                if (!result.success) {
                    alert('打开文件夹失败: ' + result.message);
                }
            } catch (error) {
                alert('打开文件夹失败: ' + error);
            }
        }
    </script>
</body>
</html>
